<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pensumforslag – Populærmusikkhistorie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css?v=197" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="img/header-icon.png" alt="" class="brand-icon" />
        <h1>Afroamerikansk musikkhistorie</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html" class="active">Startside</a>
        <a href="tre.html">Slektstre</a>
        <a href="student.html">Foreslå</a>
        <a href="teacher.html">Lærer</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <!-- Utforsk -->
    <section class="panel">
      <p class="section-label">Utforsk</p>
      <div class="dash-grid">
        <button class="dash-card" id="btn-dagens-navn">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="dash-title">Dagens artist</span>
          <span class="dash-desc">Tilfeldig utvalgt artist</span>
        </button>
        <button class="dash-card" id="btn-artister">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span class="dash-title">Artister</span>
          <span class="dash-desc">Søk og filtrer alle artister</span>
        </button>
        <button class="dash-card" id="btn-genres">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="3"/><path d="M9 17V4h8v9"/><circle cx="17" cy="13" r="3"/></svg>
          <span class="dash-title">Sjangre</span>
          <span class="dash-desc">Alle sjangre fra røtter til i dag</span>
        </button>
        <button class="dash-card" id="btn-tech">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/><path d="M8 7h8M8 11h6"/></svg>
          <span class="dash-title">Teknologi</span>
          <span class="dash-desc">Teknologiutvikling tiår for tiår</span>
        </button>
        <button class="dash-card" id="btn-society">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M9 8h1M9 12h1M9 16h1M14 8h1M14 12h1M14 16h1M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16"/></svg>
          <span class="dash-title">Samfunn</span>
          <span class="dash-desc">Samfunnsutvikling tiår for tiår</span>
        </button>
        <button class="dash-card" id="btn-podkast">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
          <span class="dash-title">Podkast</span>
          <span class="dash-desc">Studentenes egne episoder</span>
        </button>
      </div>
    </section>

    <!-- Finn artister -->
    <section class="panel">
      <p class="section-label">Finn artister</p>
      <div class="filter-bar">
        <input type="search" id="sp-search" placeholder="Søk etter navn..." />
        <select id="sp-sjanger"></select>
        <select id="sp-instrument"></select>
        <select id="sp-decade"></select>
        <select id="sp-genre"></select>
      </div>
      <div id="filter-results"></div>
      <div id="artist-list" class="artist-list"></div>
    </section>

  </main>

  <footer class="sitefoot wrap"></footer>

  <!-- Dagens navn -->
  <div class="modal-backdrop" id="modal-dagens-navn">
    <div class="modal">
      <div class="modal-head">
        <h2>Dagens navn</h2>
        <button id="sp-shuffle" class="btn ghost small">Nytt navn</button>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="spotlight" class="spotlight-grid"></div>
    </div>
  </div>

  <!-- Teknologi -->
  <div class="modal-backdrop" id="modal-teknologi">
    <div class="modal modal-wide">
      <div class="modal-head">
        <h2>Teknologiske innovasjoner</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="tech-category-tabs">
        <button class="btn ghost small tech-tab active" data-tech-cat="">Alle</button>
        <button class="btn ghost small tech-tab" data-tech-cat="Opptak og avspilling">Opptak</button>
        <button class="btn ghost small tech-tab" data-tech-cat="Kringkasting og spredning">Kringkasting</button>
        <button class="btn ghost small tech-tab" data-tech-cat="Instrumenter og lydutstyr">Instrumenter</button>
      </div>
      <div id="tech-list" class="tech-grid"></div>
    </div>
  </div>

  <!-- Podkast -->
  <div class="modal-backdrop" id="modal-podkast">
    <div class="modal modal-wide">
      <div class="modal-head">
        <h2>Podkast</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="podkast-list" class="podkast-list"></div>
    </div>
  </div>

  <!-- Tiår-liste -->
  <div class="modal-backdrop" id="modal-decade-list">
    <div class="modal">
      <div class="modal-head">
        <h2>Kontekst</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <button class="btn ghost" id="btn-teknologi" style="margin-bottom:14px;width:100%">Teknologiske innovasjoner</button>
      <p class="muted" style="margin-bottom:14px;font-size:0.9rem">Velg et tiår for å lese mer.</p>
      <div id="dl-buttons" class="explore-decade-grid"></div>
    </div>
  </div>

  <!-- Enkelt tiår (les) -->
  <div class="modal-backdrop" id="modal-decade-view">
    <div class="modal">
      <div class="modal-head">
        <h2 id="dv-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="info-section" id="dv-society-section">
        <h4 class="info-label">Samfunnsutvikling</h4>
        <div id="dv-society-timeline"></div>
        <div id="dv-society" class="info-text"></div>
        <button class="btn ghost small" id="dv-society-more" style="display:none">Les mer →</button>
      </div>
      <div class="info-section" id="dv-tech-section">
        <h4 class="info-label">Teknologiutvikling</h4>
        <div id="dv-tech-timeline"></div>
        <div id="dv-tech" class="info-text"></div>
        <button class="btn ghost small" id="dv-tech-more" style="display:none">Les mer →</button>
      </div>
      <div id="dv-kilder"></div>
      <div style="margin-top:16px">
        <button class="btn ghost small" id="dv-back">← Tilbake til oversikt</button>
      </div>
    </div>
  </div>

  <!-- Utvidet tiårsbeskrivelse -->
  <div class="modal-backdrop" id="modal-decade-more">
    <div class="modal">
      <div class="modal-head">
        <h2 id="dm-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="dm-text" class="info-text"></div>
    </div>
  </div>

  <!-- Sjangere-liste (med faner for sjangre/undersjangre + slektstre-knapp) -->
  <div class="modal-backdrop" id="modal-subgenre-list">
    <div class="modal">
      <div class="modal-head">
        <h2>Sjangre</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="genre-tabs">
        <button class="btn ghost small genre-tab active" data-genre-tab="sjangre">Sjangre</button>
        <button class="btn ghost small genre-tab" data-genre-tab="under">Undersjangre</button>
      </div>
      <button class="btn ghost" id="btn-slektstre" style="width:100%;margin-bottom:14px">Vis slektstre →</button>
      <p class="muted" style="margin-bottom:14px;font-size:0.9rem" id="sl-hint">Trykk på en sjanger for å lese beskrivelsen.</p>
      <div id="sl-chips" class="subgenre-tag-list"></div>
      <div id="ul-chips" class="subgenre-tag-list" style="display:none"></div>
    </div>
  </div>

  <!-- Sjanger-info -->
  <div class="modal-backdrop" id="modal-subgenre-info">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sgi-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p id="sgi-desc"></p>
      <div id="sgi-artists"></div>
    </div>
  </div>

  <!-- Detaljmodal -->
  <!-- Artistliste-popup (åpnes fra sjanger-beskrivelse) -->
  <div class="modal-backdrop" id="modal-artistliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="al-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="al-body"></div>
    </div>
  </div>

  <!-- Spilleliste-popup (åpnes fra sjanger-beskrivelse) -->
  <div class="modal-backdrop" id="modal-spilleliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="pl-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="pl-body"></div>
    </div>
  </div>

  <!-- Sjanger-beskrivelse (åpnes fra sjanger-bobler i artistkort) -->
  <div class="modal-backdrop" id="modal-sjanger">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sj-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="sj-body"></div>
    </div>
  </div>

  <!-- Teknologi-detalj -->
  <div class="modal-backdrop" id="modal-tech-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="td-title"></h2>
        <button class="modal-close btn ghost small">&#x2715;</button>
      </div>
      <div id="td-body"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="detail-name"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- Slektstre-popup -->
  <div class="modal-backdrop" id="modal-slektstre">
    <div class="modal modal-wide">
      <div class="modal-head">
        <h2>Slektstre</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="gx-stage gx-stage-tall" id="gx-stage">
        <div class="gx-ctrl">
          <button id="gx-zin" type="button" aria-label="Zoom inn">+</button>
          <button id="gx-zout" type="button" aria-label="Zoom ut">−</button>
          <button id="gx-rst" type="button" aria-label="Tilbakestill">⤺</button>
        </div>
        <svg id="gx-svg" width="100%" height="100%" role="img" aria-label="Slektstre over sjangrene"><g id="gx-cam"></g></svg>
      </div>
      <div class="gx-legend" id="gx-legend"></div>
    </div>
  </div>

  <script type="module" src="js/landing.js?v=196"></script>
</body>
</html>
