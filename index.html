<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pensumforslag – Populærmusikkhistorie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css?v=2.68" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png" />
</head>
<body>
  <div id="role-gate" class="role-gate">
    <div class="role-gate-card">
      <img src="img/header-icon.png" alt="" style="width:56px;height:56px;margin-bottom:12px" />
      <h2>Velkommen!</h2>
      <p style="margin:8px 0 24px;color:var(--muted)">Hvem er du?</p>
      <button class="btn" id="role-student">Student</button>
      <button class="btn ghost" id="role-teacher" style="margin-top:10px">Lærer</button>
    </div>
  </div>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="img/header-icon.png" alt="" class="brand-icon" />
        <h1>Populærmusikkhistorie - Del 1</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html" class="active">Startside</a>
        <a href="student.html">Foreslå</a>
        <a href="teacher.html" class="nav-teacher">Lærer</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <!-- Utforsk -->
    <section class="panel">
      <p class="section-label">Utforsk</p>
      <div class="dash-grid">
        <button class="dash-card" id="btn-dagens-navn">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="dash-title">Dagens artist</span>
          <span class="dash-desc">Tilfeldig utvalgt artist</span>
        </button>
        <button class="dash-card" id="btn-artister">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span class="dash-title">Artister</span>
          <span class="dash-desc">Søk og filtrer alle artister</span>
        </button>
        <button class="dash-card" id="btn-genres">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="3"/><path d="M9 17V4h8v9"/><circle cx="17" cy="13" r="3"/></svg>
          <span class="dash-title">Sjangre</span>
          <span class="dash-desc">Alle sjangre fra røtter til i dag</span>
        </button>
        <button class="dash-card" id="btn-tech">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/><path d="M8 7h8M8 11h6"/></svg>
          <span class="dash-title">Teknologi</span>
          <span class="dash-desc">Teknologiutvikling tiår for tiår</span>
        </button>
        <button class="dash-card" id="btn-society">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M9 8h1M9 12h1M9 16h1M14 8h1M14 12h1M14 16h1M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16"/></svg>
          <span class="dash-title">Samfunn</span>
          <span class="dash-desc">Samfunnsutvikling tiår for tiår</span>
        </button>
        <button class="dash-card" id="btn-podkast">
          <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
          <span class="dash-title">Podkast</span>
          <span class="dash-desc">Studentenes egne episoder</span>
        </button>
      </div>
    </section>

    <!-- Dagens artist -->
    <section class="panel" id="dagens-artist-section" style="display:none">
      <p class="section-label">Dagens artist</p>
      <div id="dagens-artist" class="spotlight-grid"></div>
    </section>

  </main>

  <footer class="sitefoot wrap"></footer>

  <!-- Finn artister -->
  <div class="modal-backdrop" id="modal-artister">
    <div class="modal modal-wide">
      <div class="modal-head">
        <h2>Finn artister</h2>
        <div class="priority-filter-bar" id="sp-prio-bar">
          <button class="prio-filter-btn" data-prio="3" title="Vis kun viktigst"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>
          <button class="prio-filter-btn" data-prio="2" title="Vis kun viktig"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></button>
          <button class="prio-filter-btn" data-prio="1" title="Vis kun mindre viktig"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg></button>
        </div>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="filter-bar">
        <input type="search" id="sp-search" placeholder="Søk etter navn..." />
        <select id="sp-sjanger"></select>
        <select id="sp-instrument"></select>
        <select id="sp-decade"></select>
        <select id="sp-genre"></select>
      </div>
      <div id="filter-results"></div>
      <div id="artist-list" class="artist-list"></div>
    </div>
  </div>

  <!-- Dagens navn -->
  <div class="modal-backdrop" id="modal-dagens-navn">
    <div class="modal">
      <div class="modal-head">
        <h2>Dagens navn</h2>
        <button id="sp-shuffle" class="btn ghost small">Nytt navn</button>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="spotlight" class="spotlight-grid"></div>
    </div>
  </div>

  <!-- Detaljmodal -->
  <div class="modal-backdrop" id="modal-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="detail-name"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="detail-body"></div>
      <div class="modal-foot-right" id="detail-foot">
        <button type="button" class="btn ghost small" id="detail-propose">Foreslå endring</button>
      </div>
    </div>
  </div>

  <!-- Endringsforslag (student) -->
  <div class="modal-backdrop" id="modal-proposal">
    <div class="modal modal-wide">
      <div class="modal-head">
        <h2 id="prop-title">Foreslå endring</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p class="muted" style="margin:0 0 14px;font-size:0.9rem">Endre feltene du vil foreslå nye verdier for. Lærer kan godta eller avvise hvert enkelt felt.</p>
      <form id="prop-form" class="add-grid"></form>
      <label style="display:block;margin:14px 0 0">Ditt navn (valgfritt)
        <input type="text" id="prop-by" placeholder="Anonym" />
      </label>
      <div id="prop-msg" class="form-msg" style="margin-top:10px"></div>
      <div class="modal-foot-right">
        <button type="button" class="btn primary" id="prop-submit">Send forslag</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/landing.js?v=2.68"></script>
</body>
</html>
