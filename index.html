<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pensumforslag – Populærmusikkhistorie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <h1>Afroamerikansk musikkhistorie</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html" class="active">Startside</a>
        <a href="tre.html">Slektstre</a>
        <a href="student.html">Foreslå</a>
        <a href="teacher.html">Lærer</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <!-- Dagens navn -->
    <section class="panel">
      <div class="spotlight-header">
        <h2 id="spotlight-heading">Dagens navn</h2>
        <button id="sp-shuffle" class="btn ghost small">Nytt navn</button>
      </div>
      <div id="spotlight" class="spotlight-grid"></div>
    </section>

    <!-- Utforsk -->
    <section class="panel">
      <h2>Utforsk</h2>
      <div class="filter-bar">
        <input type="search" id="sp-search" placeholder="Søk navn eller tags …" />
        <select id="sp-sjanger"></select>
        <select id="sp-instrument"></select>
        <select id="sp-decade"></select>
        <select id="sp-subgenre"></select>
        <select id="sp-genre"></select>
      </div>
      <div class="explore-btns">
        <button class="btn ghost" id="btn-society">Samfunn</button>
        <button class="btn ghost" id="btn-tech">Teknologi</button>
        <button class="btn ghost" id="btn-genres">Sjangere</button>
        <button class="btn ghost" id="btn-undergenres">Undersjangre</button>
      </div>
    </section>

    <!-- Alle forslag -->
    <section class="panel">
      <h2>Alle forslag</h2>
      <div id="artist-list" class="artist-list"></div>
    </section>

  </main>

  <footer class="sitefoot wrap"></footer>

  <!-- Tiår-liste -->
  <div class="modal-backdrop" id="modal-decade-list">
    <div class="modal">
      <div class="modal-head">
        <h2>Kontekst</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p class="muted" style="margin-bottom:14px;font-size:0.9rem">Velg et tiår for å lese mer.</p>
      <div id="dl-buttons" class="explore-decade-grid"></div>
    </div>
  </div>

  <!-- Enkelt tiår (les) -->
  <div class="modal-backdrop" id="modal-decade-view">
    <div class="modal">
      <div class="modal-head">
        <h2 id="dv-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div class="info-section" id="dv-society-section">
        <h4 class="info-label">Samfunnsutvikling</h4>
        <p id="dv-society" class="info-text"></p>
        <button class="btn ghost small" id="dv-society-more" style="display:none">Les mer →</button>
      </div>
      <div class="info-section" id="dv-tech-section">
        <h4 class="info-label">Teknologiutvikling</h4>
        <p id="dv-tech" class="info-text"></p>
        <button class="btn ghost small" id="dv-tech-more" style="display:none">Les mer →</button>
      </div>
      <div id="dv-kilder"></div>
      <div style="margin-top:16px">
        <button class="btn ghost small" id="dv-back">← Tilbake til oversikt</button>
      </div>
    </div>
  </div>

  <!-- Utvidet tiårsbeskrivelse -->
  <div class="modal-backdrop" id="modal-decade-more">
    <div class="modal">
      <div class="modal-head">
        <h2 id="dm-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p id="dm-text" class="info-text" style="white-space:pre-wrap"></p>
    </div>
  </div>

  <!-- Sjangere-liste -->
  <div class="modal-backdrop" id="modal-subgenre-list">
    <div class="modal">
      <div class="modal-head">
        <h2>Sjangere</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p class="muted" style="margin-bottom:14px;font-size:0.9rem">Trykk på en sjanger for å lese beskrivelsen.</p>
      <div id="sl-chips" class="subgenre-tag-list"></div>
    </div>
  </div>

  <!-- Undersjangre-liste -->
  <div class="modal-backdrop" id="modal-undergenre-list">
    <div class="modal">
      <div class="modal-head">
        <h2>Undersjangre</h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p class="muted" style="margin-bottom:14px;font-size:0.9rem">Trykk på en undersjanger for å lese beskrivelsen.</p>
      <div id="ul-chips" class="subgenre-tag-list"></div>
    </div>
  </div>

  <!-- Sjanger-info -->
  <div class="modal-backdrop" id="modal-subgenre-info">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sgi-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <p id="sgi-desc"></p>
      <div id="sgi-artists"></div>
    </div>
  </div>

  <!-- Detaljmodal -->
  <!-- Artistliste-popup (åpnes fra sjanger-beskrivelse) -->
  <div class="modal-backdrop" id="modal-artistliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="al-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="al-body"></div>
    </div>
  </div>

  <!-- Spilleliste-popup (åpnes fra sjanger-beskrivelse) -->
  <div class="modal-backdrop" id="modal-spilleliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="pl-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="pl-body"></div>
    </div>
  </div>

  <!-- Sjanger-beskrivelse (åpnes fra sjanger-bobler i artistkort) -->
  <div class="modal-backdrop" id="modal-sjanger">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sj-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="sj-body"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="detail-name"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <script type="module" src="js/landing.js?v=170"></script>
</body>
</html>
