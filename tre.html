<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slektstre – Populærmusikkhistorie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css?v=3.71" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png" />
</head>
<body>
  <script>if(localStorage.getItem("pensum-role")==="student")document.body.classList.add("role-student")</script>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="img/header-icon.png" alt="" class="brand-icon" />
        <h1>Populærmusikkhistorie - Del 1</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html" class="nav-icon" title="Startside" aria-label="Startside"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/><path d="M9 21v-6h6v6"/></svg></a>
        <a href="teacher.html" class="nav-icon" title="Lærer" aria-label="Lærer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 9L12 4 2 9l10 5 10-5z"/><path d="M6 11.5V16c0 1.66 2.69 3 6 3s6-1.34 6-3v-4.5"/><path d="M22 9v5"/></svg></a>
        <a href="teacher.html#oversikt" class="nav-icon" title="Oversikt" aria-label="Oversikt"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></a>
        <a href="teacher.html#innstillinger" class="nav-icon" title="Innstillinger" aria-label="Innstillinger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <section class="panel gx-page">
      <!-- Slektstreet er en egen SIDE, ikke en modal — derfor har den ingen
           ←/✕ i et modal-hode. Disse to knappene gjør samme jobb: Tilbake går
           dit du kom fra (Det store bildet, artistkortet …), Lukk går til
           forsiden. -->
      <div class="gx-page-head" style="display:flex;align-items:center;gap:12px">
        <h2 style="margin:0;flex:1">Slektstre</h2>
        <a class="btn ghost small gx-musicmap" style="text-decoration:none" href="https://musicmap.info" target="_blank" rel="noopener">Åpne musicmap.info</a>
        <button type="button" class="btn ghost small" id="gx-back" title="Tilbake" aria-label="Tilbake">← Tilbake</button>
        <a class="btn ghost small" style="text-decoration:none" href="index.html" title="Lukk" aria-label="Lukk">✕ Lukk</a>
      </div>
      <div class="gx-legend" id="gx-legend"></div>
      <div class="gx-stage gx-stage-tall" id="gx-stage">
        <div class="gx-ctrl">
          <button id="gx-zin" type="button" aria-label="Zoom inn">+</button>
          <button id="gx-zout" type="button" aria-label="Zoom ut">−</button>
          <button id="gx-rst" type="button" aria-label="Tilbakestill">⤺</button>
        </div>
        <svg id="gx-svg" width="100%" height="100%" role="img" aria-label="Slektstre over sjangrene"><g id="gx-cam"></g></svg>
      </div>
    </section>
  </main>

  <footer class="sitefoot wrap"></footer>

  <!-- Sjanger-, artistliste-, spilleliste- og teknologi-detalj-modalene deles
       med forsiden og injiseres av tre.js (markup i js/ui-modal-fragments.js). -->

  <!-- Artist-detalj-popup (åpnes fra artistlisten; kun denne siden) -->
  <div class="modal-backdrop" id="modal-artist-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="ad-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="ad-body"></div>
    </div>
  </div>

  <script src="js/load-guard.js?v=3.71"></script>
  <script type="module" src="js/tre.js?v=3.71"></script>
</body>
</html>
