<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slektstre – Populærmusikkhistorie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <h1>Afroamerikansk musikkhistorie</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html">Startside</a>
        <a href="tre.html" class="active">Slektstre</a>
        <a href="student.html">Foreslå</a>
        <a href="teacher.html">Lærer</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <section class="panel gx-page">
      <h2>Slektstre</h2>
      <div class="gx-stage gx-stage-tall" id="gx-stage">
        <div class="gx-ctrl">
          <button id="gx-zin" type="button" aria-label="Zoom inn">+</button>
          <button id="gx-zout" type="button" aria-label="Zoom ut">−</button>
          <button id="gx-rst" type="button" aria-label="Tilbakestill">⤺</button>
        </div>
        <svg id="gx-svg" width="100%" height="100%" role="img" aria-label="Slektstre over sjangrene"><g id="gx-cam"></g></svg>
      </div>
      <div class="gx-legend" id="gx-legend"></div>
    </section>
  </main>

  <footer class="sitefoot wrap"></footer>

  <!-- Sjanger-popup -->
  <div class="modal-backdrop" id="modal-sjanger">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sj-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="sj-body"></div>
    </div>
  </div>

  <!-- Artist-liste-popup -->
  <div class="modal-backdrop" id="modal-artistliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="al-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="al-body"></div>
    </div>
  </div>

  <!-- Spilleliste-popup -->
  <div class="modal-backdrop" id="modal-spilleliste">
    <div class="modal">
      <div class="modal-head">
        <h2 id="pl-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="pl-body"></div>
    </div>
  </div>

  <!-- Artist-detalj-popup (åpnes fra artistlisten) -->
  <div class="modal-backdrop" id="modal-artist-detail">
    <div class="modal">
      <div class="modal-head">
        <h2 id="ad-title"></h2>
        <button class="modal-close btn ghost small">✕</button>
      </div>
      <div id="ad-body"></div>
    </div>
  </div>

  <script type="module" src="js/tre.js?v=150c"></script>
</body>
</html>
