  <main class="wrap">
    <div id="banner" class="banner"></div>

    <a href="index.html" class="btn ghost small student-back">← Til startsiden</a>

    <!-- Legg inn forslag -->
    <section class="panel">
      <h2>Foreslå en artist / musiker</h2>
      <form id="add-form" class="add-grid">
        <label>Navn *
          <input type="text" id="in-name" required placeholder="f.eks. Robert Johnson" />
        </label>
        <label>Fødselsår
          <input type="number" id="in-birthyear" min="1800" max="2025" placeholder="1911" />
        </label>
        <label>Dødsår
          <input type="number" id="in-deathyear" min="1800" max="2030" placeholder="1938" />
        </label>
        <label>Kjønn *
          <select id="in-gender" required></select>
        </label>
        <label>Hovedsjanger *
          <select id="in-metaGenre" required></select>
        </label>
        <label>Instrument *
          <select id="in-instrument" required></select>
        </label>
        <label>Geografisk tilhørighet
          <input type="text" id="in-geo" placeholder="f.eks. Mississippi Delta" />
        </label>
        <label>Innflytelse fra (år) *
          <input type="number" id="in-start" min="1800" max="2030" required placeholder="f.eks. 1955" />
        </label>
        <label>Innflytelse til (år)
          <input type="number" id="in-end" min="1800" max="2030" placeholder="f.eks. 1972" />
        </label>
        <label class="full">Sjangre (fra slektstreet, kommaseparert)
          <input type="text" id="in-mainGenre" placeholder="f.eks. Blues, Jazz" />
        </label>
        <label class="full">Undersjangre / tags (frie, kommaseparert)
          <input type="text" id="in-subGenre" placeholder="f.eks. Delta blues, Akustisk blues" />
        </label>
        <label class="full">Begrunnelse / hvorfor relevant
          <textarea id="in-desc" rows="2" placeholder="Kort om musikkhistorisk betydning …"></textarea>
        </label>
        <div class="full">
          <span class="field-label">Sentrale verk / album</span>
          <div id="work-rows"></div>
          <button type="button" id="add-work" class="btn ghost small">+ Legg til verk</button>
        </div>

        <div class="full">
          <span class="field-label">Musikkeksempler</span>
          <div id="me-rows"></div>
          <button type="button" id="add-me" class="btn ghost small">+ Legg til musikkeksempel</button>
        </div>

        <label class="full">Bilde-URL
          <input type="url" id="in-image-url" placeholder="https://… (lenke til bilde av artisten, valgfritt)" />
        </label>
        <label class="full">Bildekreditering / kilde
          <input type="text" id="in-image-credit" placeholder="f.eks. Wikipedia / CC BY-SA 4.0" />
        </label>

        <div class="full">
          <span class="field-label">Kilder *</span>
          <p class="hint">Bøker, artikler, nettsider eller andre referanser brukt om denne artisten.</p>
          <div id="source-rows"></div>
          <button type="button" id="add-source" class="btn ghost small">+ Legg til kilde</button>
        </div>

        <label class="full">Ditt navn (valgfritt)
          <input type="text" id="in-by" placeholder="Anonym" />
        </label>

        <div class="full add-actions">
          <button type="submit" class="btn primary">Legg til forslag</button>
          <span id="form-msg" class="form-msg"></span>
        </div>
      </form>
    </section>
  </main>

  <footer class="sitefoot wrap">

  </footer>

  <script src="js/load-guard.js?v=3.13"></script>
  <script type="module" src="js/student.js?v=3.13"></script>
</body>
</html>
