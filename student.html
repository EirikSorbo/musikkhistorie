<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foreslå artist – Pensumforslag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html">
        <h1>Afroamerikansk musikkhistorie</h1>
      </a>
      <nav class="nav"><span id="app-version" class="version-tag"></span>
        <a href="index.html">Startside</a>
        <a href="student.html" class="active">Foreslå</a>
        <a href="teacher.html">Lærer</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="banner" class="banner"></div>

    <!-- Legg inn forslag -->
    <section class="panel">
      <h2>➕ Foreslå en artist / musiker</h2>
      <form id="add-form" class="add-grid">
        <label>Navn *
          <input type="text" id="in-name" required placeholder="f.eks. Robert Johnson" />
        </label>
        <label>Fødselsår
          <input type="number" id="in-birthyear" min="1800" max="2025" placeholder="1911" />
        </label>
        <label>Dødsår
          <input type="number" id="in-deathyear" min="1800" max="2030" placeholder="1938" />
        </label>
        <label>Kjønn *
          <select id="in-gender" required></select>
        </label>
        <label>Sjanger *
          <select id="in-genre" required></select>
        </label>
        <label>Instrument
          <select id="in-instrument"></select>
        </label>
        <label>Geografisk tilhørighet
          <input type="text" id="in-geo" placeholder="f.eks. Mississippi Delta" />
        </label>
        <label>Innflytelse fra (år) *
          <input type="number" id="in-start" min="1800" max="2030" required placeholder="f.eks. 1955" />
        </label>
        <label>Innflytelse til (år)
          <input type="number" id="in-end" min="1800" max="2030" placeholder="f.eks. 1972" />
        </label>
        <label class="full">Undersjangre / tags
          <input type="text" id="in-subgenres" placeholder="f.eks. Delta blues, akustisk blues, country blues" />
        </label>
        <label class="full">Begrunnelse / hvorfor relevant
          <textarea id="in-desc" rows="2" placeholder="Kort om musikkhistorisk betydning …"></textarea>
        </label>
        <label class="full">Sentrale verk / album
          <input type="text" id="in-works" placeholder="f.eks. «Cross Road Blues», «Hellhound on My Trail»" />
        </label>

        <div class="full">
          <span class="field-label">Lenker til musikkeksempler</span>
          <div id="link-rows"></div>
          <button type="button" id="add-link" class="btn ghost small">+ Legg til lenke</button>
        </div>

        <div class="full">
          <span class="field-label">Kilder</span>
          <p class="hint">Bøker, artikler, nettsider eller andre referanser brukt om denne artisten.</p>
          <div id="source-rows"></div>
          <button type="button" id="add-source" class="btn ghost small">+ Legg til kilde</button>
        </div>

        <label class="full">Ditt navn (valgfritt)
          <input type="text" id="in-by" placeholder="Anonym" />
        </label>

        <div class="full add-actions">
          <button type="submit" class="btn primary">Legg til forslag</button>
          <span id="form-msg" class="form-msg"></span>
        </div>
      </form>
    </section>
  </main>

  <footer class="sitefoot wrap">

  </footer>

  <script type="module" src="js/student.js"></script>
</body>
</html>
